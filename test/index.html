<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🇨🇳 Windows 11 国旗 Emoji 测试页 (标题不应包含HTML代码)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        button { padding: 8px 16px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
        button:hover { background: #106ebe; }
        .grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Windows 11 国旗 Emoji 修复测试</h1>
    <p>如果修复成功，所有出现的国旗都应显示为彩色 Twemoji 图标。</p>

    <div class="box">
        <h3>1. 静态内容测试</h3>
        <p>中国: 🇨🇳 | 美国: 🇺🇸 | 日本: 🇯🇵 | 英国: 🇬🇧</p>
        <p>混合文本: 这里有两面旗帜 🇩🇪 和 🇫🇷 夹在文字中间。</p>
    </div>

    <div class="box">
        <h3>2. 动态内容测试 (MutationObserver)</h3>
        <p>点击按钮，模拟 AJAX 加载（如推特/B站评论）。</p>
        <button id="addBtn">添加 5 个随机国旗</button>
        <div id="dynamicContainer" class="grid"></div>
    </div>

    <div class="box">
        <h3>3. 性能压力测试</h3>
        <button id="stressBtn">瞬间生成 1000 个国旗</button>
        <div id="stressContainer" class="grid"></div>
    </div>

    <div class="box">
        <h3>4. 排除标签测试</h3>
        <p>下方是一个 Textarea，里面的国旗<b>不应该</b>被替换为图片（保持原样字符）：</p>
        <textarea rows="3" cols="50">这里的内容不应改变：🇨🇳 🇺🇸</textarea>
    </div>

    <script>
        const flags = ['🇨🇳', '🇺🇸', '🇯🇵', '🇰🇷', '🇬🇧', '🇫🇷', '🇩🇪', '🇮🇹', '🇷🇺', '🇪🇸', '🇧🇷', '🇮🇳', '🇨🇦', '🇦🇺'];
        
        document.getElementById('addBtn').addEventListener('click', () => {
            const container = document.getElementById('dynamicContainer');
            for(let i=0; i<5; i++) {
                const span = document.createElement('span');
                span.textContent = flags[Math.floor(Math.random() * flags.length)] + ' ';
                container.appendChild(span);
            }
        });

        document.getElementById('stressBtn').addEventListener('click', () => {
            const container = document.getElementById('stressContainer');
            container.innerHTML = ''; // 清空
            let html = '';
            for(let i=0; i<1000; i++) {
                html += flags[Math.floor(Math.random() * flags.length)] + ' ';
            }
            container.innerHTML = html;
        });
    </script>
</body>
</html>
